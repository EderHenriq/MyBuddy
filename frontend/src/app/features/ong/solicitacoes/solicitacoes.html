<div class="dashboard-container">
  <div class="page-header">
    <h1>Solicitações de Adoção</h1>
    <p>Aprove ou reprove os pedidos de adoção dos seus pets.</p>
  </div>

  <section class="dashboard-panel">
    <div class="panel-header">
      <h2>Lista de Solicitações</h2>
      <div class="panel-actions">
        <div class="panel-search-box">
          <input type="text" placeholder="Buscar solicitação..." appDebounce (debounceOutput)="onSearch($event)" />
          <span class="material-icons">search</span>
        </div>
      </div>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>ID Pedido</th>
            <th>Pet</th>
            <th>Adotante</th>
            <th>Data</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          @for (item of pedidos; track item.id) {
            <tr>
              <td>{{ item.id }}</td>
              <td class="bold-text">{{ item.pet.nome }}</td>
              <td>{{ item.usuario.nome }}</td>
              <td>{{ item.criadoEm }}</td>
              <td>
                <span
                  class="status-badge"
                  [class.pending]="item.status === 'PENDENTE'"
                  [class.active]="item.status === 'APROVADO'"
                  [class.blocked]="item.status === 'REJEITADO'"
                >
                  {{ item.status }}
                </span>
              </td>
              <td class="actions-cell">
                <button class="action-btn" title="Analisar Ficha">
                  <span class="material-icons">assignment</span>
                </button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>

    <!-- Paginação -->
    <app-paginator [currentPage]="currentPage" [totalPages]="totalPages" (pageChange)="onPageChange($event)"></app-paginator>
  </section>
</div>
