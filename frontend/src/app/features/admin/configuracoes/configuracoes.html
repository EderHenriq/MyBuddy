<div class="dashboard-container">
  <div class="page-header">
    <h1>Configurações Globais</h1>
    <p>Ajuste os parâmetros do sistema e integrações.</p>
  </div>

  <section class="dashboard-panel settings-panel">
    <div class="panel-header">
      <h2>Preferências do Sistema</h2>
    </div>

    <div class="settings-form">
      <div class="form-group">
        <label>Nome da Plataforma</label>
        <input type="text" value="MyBuddy" disabled />
      </div>

      <div class="form-group">
        <label>Taxa Padrão do Marketplace (%)</label>
        <input type="number" value="12" />
        <small>Percentual cobrado nas vendas de petshops.</small>
      </div>

      <div class="form-group">
        <label>Aprovação Automática de ONGs</label>
        <select>
          <option value="nao" selected>
            Não (Requer moderação manual)
          </option>
          <option value="sim">Sim (Liberação imediata)</option>
        </select>
      </div>

      <div class="form-actions">
        <button class="save-btn">Salvar Alterações</button>
      </div>
    </div>
  </section>
</div>;
