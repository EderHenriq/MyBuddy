<div class="produto-card" (click)="cliqueCard.emit()">
  <div class="produto-image-container">
    <img [src]="urlImagem" [alt]="titulo" class="produto-image" />
    @if (badgeDesconto) {
      <span class="discount-badge">{{ badgeDesconto }}</span>
    }
    <button
      class="favorite-btn"
      [class.active]="favorito"
      (click)="aoClicarFavorito($event)"
      aria-label="Favoritar produto"
    >
      <i
        class="fa-heart"
        [class.fa-solid]="favorito"
        [class.fa-regular]="!favorito"
      ></i>
    </button>
  </div>

  <div class="produto-info">
    <span class="store-name">{{ nomeLoja }}</span>
    <h3 class="produto-title">{{ titulo }}</h3>

    <div class="price-container">
      @if (precoAntigo) {
        <span class="old-price">{{
          precoAntigo | currency: "BRL" : "symbol" : "1.2-2"
        }}</span>
      }
      <span class="current-price">{{
        preco | currency: "BRL" : "symbol" : "1.2-2"
      }}</span>
    </div>
  </div>

  <div class="card-actions">
    @if (quantidade === 0) {
      <button
        class="add-btn"
        (click)="aoClicarAdicionar($event)"
        aria-label="Adicionar ao carrinho"
      >
        <i class="fas fa-plus"></i>
      </button>
    } @else {
      <div class="quantity-selector">
        <button class="qty-btn" (click)="aoDiminuir($event)">
          <i class="fas fa-minus"></i>
        </button>
        <span class="qty-value">{{ quantidade }}</span>
        <button class="qty-btn" (click)="aoClicarAdicionar($event)">
          <i class="fas fa-plus"></i>
        </button>
      </div>
    }
  </div>
</div>
