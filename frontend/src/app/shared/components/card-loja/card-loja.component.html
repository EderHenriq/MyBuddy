<div class="loja-card" (click)="cliqueLoja.emit()">
  <img [src]="urlLogo" [alt]="nomeLoja" class="loja-logo" />
  <div class="loja-info">
    <h4 class="loja-name" [title]="nomeLoja">{{ nomeLoja }}</h4>
    <div class="loja-stats">
      <span class="rating">
        <i class="fas fa-star"></i>
        {{ avaliacao | number: "1.1-1" }}
      </span>
      <span class="dot">•</span>
      <span class="delivery-time">{{ tempoEntrega }}</span>
      @if (taxaEntrega !== undefined) {
        <span class="dot">•</span>
        <span class="delivery-fee">
          @if (taxaEntrega === 0) {
            Grátis
          } @else {
            {{ taxaEntrega | currency: "BRL" : "symbol" : "1.2-2" }}
          }
        </span>
      }
    </div>
  </div>
</div>
