<section class="hero" [style.backgroundImage]="backgroundImageSafe()">
  <div class="hero-content">
    @if (kicker()) {
      <span class="hero-kicker">{{ kicker() }}</span>
    }

    <h1 class="hero-title">
      {{ title() }}

      @if (highlightedText()) {
        <span class="hero-highlight">{{ highlightedText() }}</span>
      }
    </h1>

    @if (subtitle()) {
      <p class="hero-subtitle">{{ subtitle() }}</p>
    }
  </div>
</section>
