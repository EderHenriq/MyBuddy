spring.application.name=Myb-Test

# ── Banco de dados H2 em Memória para Testes ──
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── MongoDB para Testes ──
spring.data.mongodb.uri=mongodb://admin:admin@localhost:27017/mybuddy_test?authSource=admin
spring.data.mongodb.database=mybuddy_test
file.upload-dir=./target/uploads

# ── Keycloak e Segurança para Testes ──
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/mybuddy
spring.security.oauth2.client.registration.keycloak.client-id=mybuddy-backend
spring.security.oauth2.client.registration.keycloak.client-secret=fake-secret
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=client_credentials
spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:8080/realms/mybuddy
mybuddy.app.jwtSecret=not-used-in-tests
mybuddy.app.jwtExpirationMs=86400000

# ── Outros Parâmetros ──
mercadopago.access-token=token-placeholder
mercadopago.public-key=key-placeholder
mercadopago.secret-key=secret-placeholder
mercadopago.webhook-secret=webhook-placeholder
