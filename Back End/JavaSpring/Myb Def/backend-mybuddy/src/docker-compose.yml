services:
  postgres:
    image: postgres:16
    container_name: postegres-keycloak
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - 5432:5432
    networks:
      - mybuddy-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    pull_policy: if_not_present
    container_name: keycloak-mybuddy
    command: start-dev
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=keycloak
    ports:
      - 8080:8080
    depends_on:
      - postgres
    networks:
      - mybuddy-network

# ── MY-245: Declaração das redes ─────────────────────────────
networks:
  mybuddy-network:
    name: mybuddy_network
    driver: bridge
