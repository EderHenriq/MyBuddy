<app-header-landing-page></app-header-landing-page>

<main class="landing-page-content">
  <section class="landing-hero-section" aria-label="Apresentação Inicial do MyBuddy">
    <div class="hero-text-col">
      <h1 class="hero-title">
        Adote aqui o seu
        <br />
        Buddy
        <span class="highlight">perfeito.</span>
      </h1>

      <div class="hero-description">
        <p>Conectamos você a pets que precisam de um lar, feiras de adoção, veterinários e tudo o que seu amigo precisa.</p>
      </div>

      <div class="hero-actions-btn">
        <a routerLink="/src/app/features/auth/login" class="btn btn-cta">Encontrar meu Buddy</a>
      </div>
    </div>
  </section>

  <section class="services-section" id="servicos" aria-labelledby="services-title">
    <header class="section-header">
      <p class="section-subtitle">Conheça nossos serviços</p>
      <h2 id="services-title" class="section-title">
        Tudo o que seu pet
        <span class="highlight">precisa</span>
        , em um só lugar.
      </h2>
    </header>

    <div class="services-grid-cards">
      <div class="services-left-col">
        <app-card-categoria
          class="services-card-item card-veterinario"
          [title]="'Veterinários'"
          [subtitle]="'Encontre clínicas próximas a você.'"
          imageUrl="services[0].imageUrl"
        ></app-card-categoria>

        <app-card-categoria
          class="services-card-item card-petshops"
          [title]="'Petshops'"
          [subtitle]="'Hotéis, escolas e muito mais.'"
          imageUrl="services[1].imageUrl"
        ></app-card-categoria>
      </div>

      <div class="services-right-col">
        <app-card-categoria
          class="services-card-item card-eventos"
          [title]="'Eventos'"
          [subtitle]="'Feiras de adoção, campanhas de vacina, etc.'"
          imageUrl="services[2].imageUrl"
        ></app-card-categoria>
      </div>
    </div>
  </section>
</main>
