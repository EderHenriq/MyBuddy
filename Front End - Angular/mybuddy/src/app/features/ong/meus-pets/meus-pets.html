<div class="dashboard-container">
  <div class="page-header">
    <h1>Meus Animais</h1>
    <p>Gerencie todos os pets cadastrados pela sua instituição.</p>
  </div>

  <section class="dashboard-panel">
    <div class="panel-header">
      <h2>Lista de Animais</h2>
      <div class="panel-actions">
        <div class="panel-search-box">
          <input type="text" placeholder="Buscar pet..." appDebounce (debounceOutput)="onSearch($event)" />
          <span class="material-icons">search</span>
        </div>
        <button
          class="view-all-btn"
          style="background-color: var(--primary-color); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer"
        >
          + Adicionar Pet
        </button>
      </div>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Espécie</th>
            <th>Raça</th>
            <th>Idade</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          @for (item of pets; track item.nome) {
            <tr>
              <td class="bold-text">{{ item.nome }}</td>
              <td>{{ item.especie }}</td>
              <td>{{ item.raca }}</td>
              <td>{{ item.idade }}</td>
              <td>
                <span
                  class="status-badge"
                  [class.pending]="item.status === 'Em Processo'"
                  [class.active]="item.status === 'Disponível'"
                  [class.blocked]="item.status === 'Adotado'"
                >
                  {{ item.status }}
                </span>
              </td>
              <td class="actions-cell">
                <button class="action-btn" title="Editar">
                  <span class="material-icons">edit</span>
                </button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>

    <!-- Paginação -->
    <app-paginator [currentPage]="currentPage" [totalPages]="totalPages" (pageChange)="onPageChange($event)"></app-paginator>
  </section>
</div>
