<div class="dashboard-container">
  <div class="page-header">
    <h1>Pedidos</h1>
    <p>Acompanhe e gerencie as compras feitas na sua loja.</p>
  </div>

  <section class="dashboard-panel">
    <div class="panel-header">
      <h2>Lista de Pedidos</h2>
      <div class="panel-actions">
        <div class="panel-search-box">
          <input type="text" placeholder="Buscar pedido..." appDebounce (debounceOutput)="onSearch($event)" />
          <span class="material-icons">search</span>
        </div>
      </div>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>ID Pedido</th>
            <th>Cliente</th>
            <th>Valor</th>
            <th>Data</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          @for (item of pedidos; track item.id) {
            <tr>
              <td>{{ item.id }}</td>
              <td class="bold-text">{{ item.cliente }}</td>
              <td>{{ item.valor }}</td>
              <td>{{ item.data }}</td>
              <td>
                <span
                  class="status-badge"
                  [class.pending]="item.status === 'Aprovado'"
                  [class.active]="item.status === 'Entregue'"
                  [class.blocked]="item.status === 'Enviado'"
                >
                  {{ item.status }}
                </span>
              </td>
              <td class="actions-cell">
                <button class="action-btn" title="Ver Detalhes">
                  <span class="material-icons">visibility</span>
                </button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>

    <!-- Paginação -->
    <app-paginator [currentPage]="currentPage" [totalPages]="totalPages" (pageChange)="onPageChange($event)"></app-paginator>
  </section>
</div>
