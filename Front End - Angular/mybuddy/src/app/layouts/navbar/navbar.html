<header class="navbar-container">
  <div class="navbar-content">
    <!-- Logo Section -->
    <a class="navbar-brand" routerLink="/">
      <img src="assets/logo/logo-provisoria.png" alt="MyBuddy Logo" class="brand-logo" />
      <span class="brand-text">MyBuddy</span>
    </a>

    <!-- Navigation Menu -->
    <nav class="navbar-menu">
      <ul class="nav-links">
        <li
          *ngFor="let item of navItems"
          class="nav-item"
          [routerLink]="item.link"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.link === '/home' }"
        >
          {{ item.label }}
        </li>
      </ul>
    </nav>

    <!-- User Actions -->
    <div class="navbar-actions">
      <button class="action-btn notification-btn" routerLink="/home">
        <i class="pi pi-bell"></i>
      </button>
      <div class="profile-container" routerLink="/adotante">
        <!-- User Profile Image -->
        <img src="assets/logo/logo-provisoria.png" alt="User Profile" class="profile-img" />
      </div>
    </div>
  </div>
</header>
