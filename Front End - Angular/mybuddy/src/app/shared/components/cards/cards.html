<div class="card">
  <div class="card-img">
    <img [src]="petTeste?.fotoPet" [alt]="petTeste?.nomePet" />
  </div>

  <div class="card-header">
    <h2>{{ petTeste?.nomePet }}</h2>
  </div>

  <div class="card-informations">
    <ul>
      <li>Idade: {{ petTeste?.idade }}</li>
      <li>Raça: {{ petTeste?.raca }}</li>
      <li>Sexo: {{ petTeste?.sexo }}</li>
      <li>Vacinado: {{ petTeste?.vacinado ? 'Sim' : 'Não' }}</li>
    </ul>
  </div>

  <footer class="card-actions">
    <button class="infos">
      Mais informações
      <span class="material-icons">arrow_forward</span>
    </button>

    <button class="favorite">
      <span class="material-icons">favorite</span>
    </button>
  </footer>
</div>
