name: CI - MyBuddy Tests
on:
  push:
    branches:
      - Developer
      - main
      - teste
  pull_request:
    branches:
      - Developer
      - main
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: admin
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Rodar testes com Maven
        run: mvn test "-Dsurefire.excludes=**/KeycloakIntegrationTest.java,**/PetRepositoryContainerTest.java,**/AuthControllerIntegrationTest.java"
        working-directory: backend
        env:
          MERCADOPAGO_ACCESS_TOKEN: ${{ secrets.MERCADOPAGO_ACCESS_TOKEN }}
          SPRING_DATA_MONGODB_URI: mongodb://admin:admin@localhost:27017/mybuddy_test?authSource=admin
      - name: Publicar relatório do Jacoco
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: "backend/target/site/jacoco/"

  e2e-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package.json'

      - name: Instalar dependências
        run: npm install --legacy-peer-deps
        working-directory: 'frontend'

      - name: Instalar browsers do Playwright
        run: npx playwright install chromium --with-deps
        working-directory: 'frontend'

      - name: Executar testes E2E do Playwright
        run: npm run e2e
        working-directory: 'frontend'

      - name: Upload de relatórios em caso de falha
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: 'frontend/playwright-report/'
          retention-days: 30

