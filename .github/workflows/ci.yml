name: CI - MyBuddy Tests
on:
  push:
    branches:
      - Developer
      - main
  pull_request:
    branches:
      - Developer
      - main
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Rodar testes com Maven
        run: mvn test "-Dsurefire.excludes=**/KeycloakIntegrationTest.java,**/PetRepositoryContainerTest.java"
        working-directory: "Back End/JavaSpring/Myb Def/backend-mybuddy"
        env:
          MERCADOPAGO_ACCESS_TOKEN: ${{ secrets.MERCADOPAGO_ACCESS_TOKEN }}
      - name: Publicar relatório do Jacoco
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: "Back End/JavaSpring/Myb Def/backend-mybuddy/target/site/jacoco/"
