name: CI - MyBuddy Tests

on:
  push:
    branches:
      - develop
      - main
      - 'feature/**'
  pull_request:
    branches:
      - develop
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Rodar testes com Maven
        run: mvn test
        working-directory: "Back End/JavaSpring/Myb Def/backend-mybuddy"

      - name: Publicar relatório do Jacoco
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: jacoco-report
          path: "Back End/JavaSpring/Myb Def/backend-mybuddy/target/site/jacoco/"