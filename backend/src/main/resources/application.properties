spring.application.name=Myb
server.port=8081

#Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/mybuddy
spring.security.oauth2.client.registration.keycloak.client-id=mybuddy-backend
spring.security.oauth2.client.registration.keycloak.client-secret=${KC_CLIENT_SECRET}
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=client_credentials
spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:8080/realms/mybuddy

# ── PostgreSQL ──
spring.datasource.url=jdbc:postgresql://localhost:5432/mybuddy
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=mybuddy
spring.datasource.password=mybuddy

# ── HikariCP Connection Pool ──
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# ── Flyway ──
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.ignore-migration-patterns=*:missing

# ── MongoDB ──
spring.data.mongodb.uri=mongodb://admin:admin@localhost:27017/mybuddy?authSource=admin
spring.data.mongodb.database=mybuddy
spring.data.mongodb.auto-index-creation=true
file.upload-dir=${UPLOAD_DIR:./uploads}
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.jpa.properties.hibernate.format_sql=true

# JWT
mybuddy.app.jwtSecret=${JWT_SECRET:not-used}
mybuddy.app.jwtExpirationMs=86400000

# Log
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web.servlet.DispatcherServlet=INFO

# Mercado Pago
mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN:token-placeholder}
mercadopago.public-key=${MERCADOPAGO_PUBLIC_KEY:key-placeholder}
mercadopago.secret-key=${MERCADOPAGO_SECRET_KEY:secret-placeholder}
mercadopago.webhook-secret=${MERCADOPAGO_WEBHOOK_SECRET:webhook-placeholder}

# ── Redis (Cache & Session) ──
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.cache.type=redis