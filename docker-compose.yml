services:

  # ── MY-239: MongoDB ──────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: mybuddy-mongodb
    restart: unless-stopped

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}

    # MY-243 → dados do MongoDB persistem entre reinicializações
    volumes:
      - mongodb-data:/data/db

    networks:
      - mybuddy-network

    healthcheck:
      test: ["CMD", "mongosh", "--username", "${MONGO_INITDB_ROOT_USERNAME}", "--password", "${MONGO_INITDB_ROOT_PASSWORD}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis (Cache) ──
  redis:
    image: redis:7-alpine
    container_name: mybuddy-redis
    restart: unless-stopped

    networks:
      - mybuddy-network

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL (banco do backend) ───────────
  postgres:

    image: postgres:16-alpine
    container_name: mybuddy-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    # MY-243 → dados do PostgreSQL persistem entre reinicializações
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

    networks:
      - mybuddy-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mybuddy -d mybuddy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── MY-242: Keycloak ──────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    container_name: mybuddy-keycloak
    restart: unless-stopped

    command: ${KC_START_MODE:-start-dev} --import-realm

    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      # Keycloak usando banco separado do backend
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
 
      KC_HTTP_PORT: 8080
      KC_HTTP_ENABLED: true
      KC_HEALTH_ENABLED: true

      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_PROXY_HEADERS: ${KC_PROXY_HEADERS:-}

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - mybuddy-network

    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json

    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.0\r\n\r\n' >&3 && cat <&3 | grep -q 'UP' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s

  # ── MY-234: Backend Spring Boot ───────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mybuddy-backend
    restart: unless-stopped

    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DATABASE: ${MONGODB_DATABASE}
      KC_CLIENT_SECRET: ${KC_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      UPLOAD_DIR: ${UPLOAD_DIR}
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN}
      MERCADOPAGO_WEBHOOK_SECRET: ${MERCADOPAGO_WEBHOOK_SECRET}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}

    volumes:
      - backend-uploads:/app/uploads

    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - mybuddy-network

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q 'UP' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── MY-236: Frontend Angular ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    container_name: mybuddy-frontend
    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - mybuddy-network
    
    environment:
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://localhost:8080}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost}
      MP_PUBLIC_KEY: ${MP_PUBLIC_KEY:-APP_USR-112696f3-3603-4175-826f-167cf58606b2}

# ── Caddy (Reverse Proxy + HTTPS) ──────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: mybuddy-caddy
    restart: unless-stopped

    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-localhost}

    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"

    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config

    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy

    networks:
      - mybuddy-network

# ── MY-243: Declaração dos volumes ───────────────────────────
# Dados salvos mesmo após "docker compose down"
# Para apagar tudo: docker compose down -v
volumes:
  mongodb-data:
    name: mybuddy_mongodb_data

  postgres-data:
    name: mybuddy_postgres_data

  backend-uploads:
    name: mybuddy_backend_uploads

  caddy-data:
    name: mybuddy_caddy_data

  caddy-config:
    name: mybuddy_caddy_config

networks:
  mybuddy-network:
    name: mybuddy_network
    driver: bridge
